server:
  port: 8083

spring:
  application:
    name: spot-worker

  datasource:
    url: jdbc:mysql://localhost:3306/spot_worker
    username: root
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
