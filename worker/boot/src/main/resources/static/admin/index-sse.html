<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPOT Admin Dashboard (SSE)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6366F1',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: inherit;
            animation: pulse-ring 1.5s ease-out infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // API Base URL
        const API_BASE = '';

        // SSE 연결 상태
        const ConnectionStatus = {
            CONNECTING: 'connecting',
            CONNECTED: 'connected',
            DISCONNECTED: 'disconnected',
            ERROR: 'error'
        };

        // 연결 상태 뱃지
        function ConnectionBadge({ status }) {
            const statusConfig = {
                [ConnectionStatus.CONNECTING]: {
                    bg: 'bg-yellow-100',
                    text: 'text-yellow-700',
                    dot: 'bg-yellow-500',
                    label: '연결 중...'
                },
                [ConnectionStatus.CONNECTED]: {
                    bg: 'bg-green-100',
                    text: 'text-green-700',
                    dot: 'bg-green-500',
                    label: 'SSE 연결됨'
                },
                [ConnectionStatus.DISCONNECTED]: {
                    bg: 'bg-gray-100',
                    text: 'text-gray-700',
                    dot: 'bg-gray-500',
                    label: '연결 끊김'
                },
                [ConnectionStatus.ERROR]: {
                    bg: 'bg-red-100',
                    text: 'text-red-700',
                    dot: 'bg-red-500',
                    label: '연결 오류'
                }
            };

            const config = statusConfig[status];

            return (
                <div className={`flex items-center gap-2 px-3 py-1.5 ${config.bg} ${config.text} rounded-full text-sm`}>
                    <span className={`relative w-2 h-2 ${config.dot} rounded-full ${status === ConnectionStatus.CONNECTED ? 'pulse-ring' : ''}`}></span>
                    {config.label}
                </div>
            );
        }

        // 통계 카드 컴포넌트
        function StatCard({ title, value, suffix = '', icon, color, isUpdated }) {
            return (
                <div className={`bg-white rounded-xl p-6 shadow-sm border transition-all duration-300 ${isUpdated ? 'border-primary ring-2 ring-primary/20' : 'border-gray-100'}`}>
                    <div className="flex items-center justify-between">
                        <div>
                            <p className="text-gray-500 text-sm font-medium">{title}</p>
                            <p className="text-3xl font-bold mt-2 text-gray-900">
                                {value.toLocaleString()}{suffix}
                            </p>
                        </div>
                        <div className={`w-14 h-14 rounded-xl ${color} flex items-center justify-center`}>
                            <i className={`${icon} text-2xl text-white`}></i>
                        </div>
                    </div>
                </div>
            );
        }

        // 차트 컴포넌트
        function AttendanceChart({ hourlyData }) {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
                gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: hourlyData.map(d => `${d.hour}:00`),
                        datasets: [{
                            label: '출석 수',
                            data: hourlyData.map(d => d.attendanceCount),
                            borderColor: '#3B82F6',
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#3B82F6',
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#f3f4f6' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        }
                    }
                });

                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [hourlyData]);

            return <canvas ref={chartRef}></canvas>;
        }

        // 시뮬레이터 패널
        function SimulatorPanel() {
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [config, setConfig] = useState({
                memberCount: 10,
                attendanceCount: 50,
                pointCount: 50
            });

            const handleSimulate = async () => {
                setLoading(true);
                setResult(null);
                try {
                    const res = await fetch(`${API_BASE}/api/admin/simulator/dashboard/simulate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                    const data = await res.json();
                    if (data.isSuccess) {
                        setResult({ success: true, message: '이벤트가 발행되었습니다. SSE로 자동 업데이트됩니다.' });
                    } else {
                        setResult({ success: false, message: data.message || '시뮬레이션 실패' });
                    }
                } catch (err) {
                    setResult({ success: false, message: err.message });
                }
                setLoading(false);
            };

            return (
                <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4">
                        <i className="ri-flask-line mr-2 text-primary"></i>
                        이벤트 시뮬레이터
                    </h3>
                    <div className="grid grid-cols-3 gap-4 mb-4">
                        <div>
                            <label className="text-sm text-gray-500">회원 가입</label>
                            <input
                                type="number"
                                value={config.memberCount}
                                onChange={e => setConfig({...config, memberCount: parseInt(e.target.value) || 0})}
                                className="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            />
                        </div>
                        <div>
                            <label className="text-sm text-gray-500">출석 체크</label>
                            <input
                                type="number"
                                value={config.attendanceCount}
                                onChange={e => setConfig({...config, attendanceCount: parseInt(e.target.value) || 0})}
                                className="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            />
                        </div>
                        <div>
                            <label className="text-sm text-gray-500">포인트 지급</label>
                            <input
                                type="number"
                                value={config.pointCount}
                                onChange={e => setConfig({...config, pointCount: parseInt(e.target.value) || 0})}
                                className="w-full mt-1 px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                            />
                        </div>
                    </div>
                    {result && (
                        <div className={`mb-4 p-3 rounded-lg text-sm ${result.success ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>
                            <i className={`${result.success ? 'ri-check-line' : 'ri-error-warning-line'} mr-2`}></i>
                            {result.message}
                        </div>
                    )}
                    <button
                        onClick={handleSimulate}
                        disabled={loading}
                        className="w-full bg-primary hover:bg-blue-600 text-white py-3 rounded-lg font-medium transition-colors disabled:opacity-50"
                    >
                        {loading ? (
                            <><i className="ri-loader-4-line animate-spin mr-2"></i>처리 중...</>
                        ) : (
                            <><i className="ri-play-circle-line mr-2"></i>시뮬레이션 실행</>
                        )}
                    </button>
                </div>
            );
        }

        // 이벤트 로그
        function EventLog({ events }) {
            return (
                <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                    <h3 className="text-lg font-semibold text-gray-900 mb-4">
                        <i className="ri-terminal-line mr-2 text-primary"></i>
                        SSE 이벤트 로그
                    </h3>
                    <div className="h-48 overflow-y-auto space-y-2 font-mono text-sm">
                        {events.length === 0 ? (
                            <p className="text-gray-400">이벤트를 기다리는 중...</p>
                        ) : (
                            events.map((event, idx) => (
                                <div key={idx} className="flex gap-2 text-gray-600 border-b border-gray-50 pb-2">
                                    <span className="text-gray-400 shrink-0">{event.time}</span>
                                    <span className={`px-2 py-0.5 rounded text-xs shrink-0 ${
                                        event.type === 'connected' ? 'bg-green-100 text-green-700' :
                                        event.type === 'stats' ? 'bg-blue-100 text-blue-700' :
                                        event.type === 'error' ? 'bg-red-100 text-red-700' :
                                        'bg-gray-100 text-gray-700'
                                    }`}>
                                        {event.type}
                                    </span>
                                    <span className="truncate">{event.message}</span>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        // 메인 대시보드
        function Dashboard() {
            const [stats, setStats] = useState(null);
            const [hourlyStats, setHourlyStats] = useState([]);
            const [loading, setLoading] = useState(true);
            const [connectionStatus, setConnectionStatus] = useState(ConnectionStatus.DISCONNECTED);
            const [lastUpdated, setLastUpdated] = useState(null);
            const [events, setEvents] = useState([]);
            const [updatedFields, setUpdatedFields] = useState({});
            const eventSourceRef = useRef(null);

            const addEvent = useCallback((type, message) => {
                const time = new Date().toLocaleTimeString();
                setEvents(prev => [{time, type, message}, ...prev].slice(0, 50));
            }, []);

            const fetchHourlyStats = async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/admin/dashboard/stats/hourly`);
                    const data = await res.json();
                    if (data.isSuccess) {
                        setHourlyStats(data.result);
                    }
                } catch (err) {
                    console.error('Failed to fetch hourly stats:', err);
                }
            };

            // SSE 연결
            useEffect(() => {
                const connectSSE = () => {
                    setConnectionStatus(ConnectionStatus.CONNECTING);
                    addEvent('system', 'SSE 연결 시도 중...');

                    const eventSource = new EventSource(`${API_BASE}/api/admin/dashboard/stats/stream`);
                    eventSourceRef.current = eventSource;

                    eventSource.addEventListener('connected', (event) => {
                        setConnectionStatus(ConnectionStatus.CONNECTED);
                        addEvent('connected', 'SSE 연결 성공');
                        setLoading(false);
                    });

                    eventSource.addEventListener('stats', (event) => {
                        try {
                            const newStats = JSON.parse(event.data);

                            // 변경된 필드 감지
                            setStats(prev => {
                                if (prev) {
                                    const changed = {};
                                    if (prev.memberStats?.newMemberCount !== newStats.memberStats?.newMemberCount) {
                                        changed.member = true;
                                    }
                                    if (prev.attendanceStats?.totalCount !== newStats.attendanceStats?.totalCount) {
                                        changed.attendance = true;
                                    }
                                    if (prev.pointStats?.totalGranted !== newStats.pointStats?.totalGranted) {
                                        changed.pointTotal = true;
                                    }
                                    if (prev.pointStats?.grantCount !== newStats.pointStats?.grantCount) {
                                        changed.pointCount = true;
                                    }
                                    setUpdatedFields(changed);
                                    setTimeout(() => setUpdatedFields({}), 1000);
                                }
                                return newStats;
                            });

                            setLastUpdated(new Date());
                            addEvent('stats', `회원: ${newStats.memberStats?.newMemberCount || 0}, 출석: ${newStats.attendanceStats?.totalCount || 0}, 포인트: ${newStats.pointStats?.totalGranted || 0}P`);

                            // 차트도 업데이트
                            fetchHourlyStats();
                        } catch (err) {
                            console.error('Failed to parse stats:', err);
                            addEvent('error', '데이터 파싱 실패');
                        }
                    });

                    eventSource.onerror = (error) => {
                        console.error('SSE Error:', error);
                        setConnectionStatus(ConnectionStatus.ERROR);
                        addEvent('error', 'SSE 연결 오류 - 5초 후 재연결');
                        eventSource.close();

                        // 재연결 시도
                        setTimeout(connectSSE, 5000);
                    };
                };

                connectSSE();
                fetchHourlyStats();

                return () => {
                    if (eventSourceRef.current) {
                        eventSourceRef.current.close();
                    }
                };
            }, [addEvent]);

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <i className="ri-loader-4-line text-4xl text-primary animate-spin"></i>
                            <p className="mt-4 text-gray-500">SSE 연결 중...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                                        <i className="ri-dashboard-3-line text-white text-xl"></i>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-gray-900">SPOT Admin</h1>
                                        <p className="text-sm text-gray-500">실시간 대시보드 (SSE)</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4">
                                    <a href="index.html" className="text-sm text-gray-500 hover:text-primary">
                                        <i className="ri-refresh-line mr-1"></i>폴링 버전으로
                                    </a>
                                    <ConnectionBadge status={connectionStatus} />
                                    {lastUpdated && (
                                        <span className="text-sm text-gray-400">
                                            마지막 업데이트: {lastUpdated.toLocaleTimeString()}
                                        </span>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <StatCard
                                title="신규 가입"
                                value={stats?.memberStats?.newMemberCount || 0}
                                suffix="명"
                                icon="ri-user-add-line"
                                color="bg-green-500"
                                isUpdated={updatedFields.member}
                            />
                            <StatCard
                                title="오늘 출석"
                                value={stats?.attendanceStats?.totalCount || 0}
                                suffix="건"
                                icon="ri-checkbox-circle-line"
                                color="bg-blue-500"
                                isUpdated={updatedFields.attendance}
                            />
                            <StatCard
                                title="포인트 지급"
                                value={stats?.pointStats?.totalGranted || 0}
                                suffix="P"
                                icon="ri-coin-line"
                                color="bg-yellow-500"
                                isUpdated={updatedFields.pointTotal}
                            />
                            <StatCard
                                title="지급 건수"
                                value={stats?.pointStats?.grantCount || 0}
                                suffix="건"
                                icon="ri-exchange-line"
                                color="bg-purple-500"
                                isUpdated={updatedFields.pointCount}
                            />
                        </div>

                        {/* Chart Section */}
                        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 mb-8">
                            <div className="flex items-center justify-between mb-6">
                                <h3 className="text-lg font-semibold text-gray-900">
                                    <i className="ri-line-chart-line mr-2 text-primary"></i>
                                    시간대별 출석 현황
                                </h3>
                                <span className="text-sm text-gray-500">{stats?.date}</span>
                            </div>
                            <div className="h-80">
                                <AttendanceChart hourlyData={hourlyStats} />
                            </div>
                        </div>

                        {/* Bottom Section */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <SimulatorPanel />
                            <EventLog events={events} />
                        </div>
                    </main>
                </div>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
